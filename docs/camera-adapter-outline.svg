<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <pattern id="fingers" width="6.5" height="12" patternUnits="userSpaceOnUse">
      <rect width="6.5" height="12" fill="#cbaa4e"/>
      <rect x="4.9" width="1.6" height="12" fill="#4a3a12"/>
    </pattern>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#444"/>
    </marker>
  </defs>

  <rect width="820" height="360" fill="#fbfbf6"/>
  <text x="410" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#222">
    J4 &#8596; ESP32-P4-EYE camera adapter &#8212; flex outline (top view, not to scale)</text>

  <!-- flex body -->
  <rect x="185" y="140" width="410" height="96" rx="7" fill="#b9822e" stroke="#6d4a15" stroke-width="1.5"/>
  <text x="390" y="193" text-anchor="middle" font-size="13" fill="#3a2708">2-layer flex &#8212; signal + GND plane</text>

  <!-- J4 end: stiffener + gold fingers -->
  <rect x="120" y="136" width="72" height="104" rx="4" fill="#e0cf96" stroke="#6d4a15" stroke-width="1"/>
  <rect x="126" y="146" width="52" height="84" fill="url(#fingers)" stroke="#6d4a15" stroke-width="0.6"/>
  <circle cx="131" cy="151" r="4" fill="#c0392b"/>
  <text x="156" y="256" text-anchor="middle" font-size="12" fill="#222">J4 end</text>
  <text x="156" y="272" text-anchor="middle" font-size="11" fill="#555">24 &#215; 0.5&#8201;mm gold fingers</text>
  <text x="156" y="286" text-anchor="middle" font-size="11" fill="#555">+ stiffener &#8594; into J4 socket</text>

  <!-- module end: FFC socket -->
  <rect x="588" y="126" width="96" height="124" rx="4" fill="#2c2c2c" stroke="#000" stroke-width="1.2"/>
  <rect x="596" y="140" width="14" height="96" fill="#4a4a4a"/>
  <rect x="620" y="140" width="58" height="96" fill="#3a3a3a"/>
  <circle cx="603" cy="147" r="4" fill="#e74c3c"/>
  <text x="636" y="270" text-anchor="middle" font-size="12" fill="#222">CN1: 24-pin 0.5&#8201;mm FFC socket</text>
  <text x="636" y="286" text-anchor="middle" font-size="11" fill="#555">&#8592; camera module FPC plugs in</text>

  <!-- width dimension -->
  <line x1="98" y1="136" x2="98" y2="240" stroke="#444" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="90" y="192" text-anchor="middle" font-size="11" fill="#444" transform="rotate(-90 90 192)">&#8776; 13.5&#8201;mm (24 &#215; 0.5)</text>

  <!-- length dimension -->
  <line x1="126" y1="315" x2="678" y2="315" stroke="#444" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="402" y="332" text-anchor="middle" font-size="11" fill="#444">length as short as practical (~25&#8211;35&#8201;mm)</text>

  <!-- P1 legend -->
  <circle cx="470" cy="60" r="4" fill="#c0392b"/>
  <text x="482" y="64" font-size="11" fill="#555">pin 1</text>

  <!-- routing note -->
  <text x="410" y="112" text-anchor="middle" font-size="12" fill="#333">
    CLK (7&#8596;18) &amp; DATA0 (9/10&#8596;5/6) = 100&#8201;&#937; diff pairs &#183; MCLK/I&#178;C/RST single-ended &#183; DVDD(1.5V) not connected</text>
</svg>
