<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="Helvetica, Arial, sans-serif">
  <rect width="820" height="360" fill="#fbfbf6"/>
  <text x="410" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#222">
    J4 &#8596; ESP32-P4-EYE camera adapter &#8212; flex outline (top view, not to scale)</text>

  <!-- flex body -->
  <rect x="185" y="140" width="410" height="96" rx="7" fill="#b9822e" stroke="#6d4a15" stroke-width="1.5"/>
  <text x="392" y="193" text-anchor="middle" font-size="13" fill="#3a2708">2-layer flex &#8212; signal + GND plane</text>

  <!-- J4 end: stiffener + gold fingers (explicit strips) -->
  <rect x="120" y="136" width="72" height="104" rx="4" fill="#e0cf96" stroke="#6d4a15" stroke-width="1"/>
  <rect x="126" y="146" width="52" height="84" fill="#cbaa4e" stroke="#6d4a15" stroke-width="0.6"/>
  <g stroke="#4a3a12" stroke-width="0.9">
    <line x1="126" y1="149.5" x2="178" y2="149.5"/><line x1="126" y1="153" x2="178" y2="153"/>
    <line x1="126" y1="156.5" x2="178" y2="156.5"/><line x1="126" y1="160" x2="178" y2="160"/>
    <line x1="126" y1="163.5" x2="178" y2="163.5"/><line x1="126" y1="167" x2="178" y2="167"/>
    <line x1="126" y1="170.5" x2="178" y2="170.5"/><line x1="126" y1="174" x2="178" y2="174"/>
    <line x1="126" y1="177.5" x2="178" y2="177.5"/><line x1="126" y1="181" x2="178" y2="181"/>
    <line x1="126" y1="184.5" x2="178" y2="184.5"/><line x1="126" y1="188" x2="178" y2="188"/>
    <line x1="126" y1="191.5" x2="178" y2="191.5"/><line x1="126" y1="195" x2="178" y2="195"/>
    <line x1="126" y1="198.5" x2="178" y2="198.5"/><line x1="126" y1="202" x2="178" y2="202"/>
    <line x1="126" y1="205.5" x2="178" y2="205.5"/><line x1="126" y1="209" x2="178" y2="209"/>
    <line x1="126" y1="212.5" x2="178" y2="212.5"/><line x1="126" y1="216" x2="178" y2="216"/>
    <line x1="126" y1="219.5" x2="178" y2="219.5"/><line x1="126" y1="223" x2="178" y2="223"/>
    <line x1="126" y1="226.5" x2="178" y2="226.5"/>
  </g>
  <circle cx="131" cy="151" r="4" fill="#c0392b"/>
  <text x="156" y="256" text-anchor="middle" font-size="12" fill="#222">J4 end</text>
  <text x="156" y="272" text-anchor="middle" font-size="11" fill="#555">24 &#215; 0.5&#8201;mm gold fingers</text>
  <text x="156" y="286" text-anchor="middle" font-size="11" fill="#555">+ stiffener &#8594; into J4 socket</text>

  <!-- module end: FFC socket -->
  <rect x="588" y="126" width="96" height="124" rx="4" fill="#2c2c2c" stroke="#000" stroke-width="1.2"/>
  <rect x="596" y="140" width="14" height="96" fill="#565656"/>
  <rect x="620" y="140" width="58" height="96" fill="#3a3a3a"/>
  <circle cx="603" cy="147" r="4" fill="#e74c3c"/>
  <text x="636" y="270" text-anchor="middle" font-size="12" fill="#222">CN1: 24-pin 0.5&#8201;mm FFC socket</text>
  <text x="636" y="286" text-anchor="middle" font-size="11" fill="#555">&#8592; camera module FPC plugs in</text>

  <!-- width dimension -->
  <line x1="100" y1="136" x2="100" y2="240" stroke="#444" stroke-width="1"/>
  <line x1="96" y1="136" x2="104" y2="136" stroke="#444" stroke-width="1"/>
  <line x1="96" y1="240" x2="104" y2="240" stroke="#444" stroke-width="1"/>
  <text x="88" y="192" text-anchor="middle" font-size="11" fill="#444" transform="rotate(-90 88 192)">&#8776; 13.5&#8201;mm (24 &#215; 0.5)</text>

  <!-- length dimension -->
  <line x1="126" y1="315" x2="678" y2="315" stroke="#444" stroke-width="1"/>
  <line x1="126" y1="311" x2="126" y2="319" stroke="#444" stroke-width="1"/>
  <line x1="678" y1="311" x2="678" y2="319" stroke="#444" stroke-width="1"/>
  <text x="402" y="333" text-anchor="middle" font-size="11" fill="#444">length as short as practical (~25&#8211;35&#8201;mm)</text>

  <!-- P1 legend -->
  <circle cx="470" cy="60" r="4" fill="#c0392b"/>
  <text x="482" y="64" font-size="11" fill="#555">pin 1</text>

  <!-- routing note -->
  <text x="410" y="112" text-anchor="middle" font-size="12" fill="#333">
    CLK (7&#8596;18) &amp; DATA0 (9/10&#8596;5/6) = 100&#8201;&#937; diff pairs &#183; MCLK / I&#178;C / RST single-ended &#183; DVDD(1.5&#8201;V) not connected</text>
</svg>
